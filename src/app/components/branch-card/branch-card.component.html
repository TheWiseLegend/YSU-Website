<!-- src/app/components/branch-card/branch-card.component.html -->
<div class="branch-card">
  <div class="branch-image">
    <img [src]="branch.imageUrl" [alt]="branchTitle">
  </div>
  <div class="branch-content">
    <h3 class="branch-title">{{ branchTitle }}</h3>
    <div class="branch-meta">
      <div class="branch-city">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 22C16 18 20 14.4183 20 10C20 5.58172 16.4183 2 12 2C7.58172 2 4 5.58172 4 10C4 14.4183 8 18 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>{{ branch.city }}</span>
      </div>
    </div>
    <div class="branch-actions">
      <a [routerLink]="['/branches', branch.id]" class="view-details-btn">
        <span>عرض التفاصيل</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>
  </div>
</div>
