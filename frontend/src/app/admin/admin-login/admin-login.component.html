<!-- src/app/admin/admin-login/admin-login.component.html -->
<div class="admin-login-container">
    <img class="logo" src="/logo/ysu_logo.webp" alt="اتحاد الطلبة اليمنيين في ماليزيا" />
    <div class="login-form">
      <h1 class="login-title">تسجيل دخول</h1>
      
      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <div class="form-group">
          <input
            type="password"
            id="password"
            formControlName="password"
            class="form-control"
            placeholder="كلمة المرور"
            [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            [disabled]="isSubmitting"
          >
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-message">
            الرجاء إدخال كلمة المرور
          </div>
        </div>
        
        <button type="submit" class="login-btn" [disabled]="loginForm.invalid || isSubmitting">
          {{ isSubmitting ? 'جاري التحقق...' : 'تسجيل الدخول' }}
        </button>
        
        <!-- Error message -->
        <div class="error-message server-error" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>
      </form>

      <a routerLink="/membership/login" class="member-login-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        صفحة الأعضاء
      </a>
    </div>
  </div>
