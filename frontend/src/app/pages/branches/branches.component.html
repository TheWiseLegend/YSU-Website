<app-page-header titleFirst="فروع" titleSecond=" الإتحاد"></app-page-header>

<div class="branches-page">
  <div class="container">

    <!-- Header -->
    <div class="branches-page__header">
      <div class="section-label section-label--centered">
        <span class="section-label__line"></span>
        <h2 class="section-title">فروع الاتحاد</h2>
        <span class="section-label__line"></span>
      </div>
      <p class="branches-page__subtitle">
        يمتلك اتحاد الطلبة اليمنيين في ماليزيا فروعاً في معظم الجامعات الماليزية التي يدرس فيها طلاب يمنيون
      </p>
    </div>

    <!-- Loading -->
    <div class="state-block" *ngIf="isLoading">
      <div class="spinner"></div>
      <p>جاري تحميل الفروع...</p>
    </div>

    <!-- Error -->
    <div class="state-block" *ngIf="errorMessage && !isLoading">
      <p>لا تتوفر بيانات الفروع في الوقت الحالي</p>
    </div>

    <div *ngIf="!isLoading && !errorMessage">

      <!-- City filter -->
      <div class="filter-bar">
        <button
          *ngFor="let city of cities"
          class="filter-btn"
          [class.active]="selectedCity === city"
          (click)="filterByCity(city)">
          {{ city }}
        </button>
      </div>

      <!-- Grid -->
      <div class="branches-grid" *ngIf="filteredBranches.length > 0">
        <div class="branch-item" *ngFor="let branch of filteredBranches">
          <app-branch-card [branch]="branch"></app-branch-card>
        </div>
      </div>

      <!-- Empty filter result -->
      <div class="state-block state-block--empty" *ngIf="filteredBranches.length === 0">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
          <path d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 22V12H15V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h3>لا توجد فروع في هذه المدينة</h3>
        <p>يرجى اختيار مدينة أخرى من القائمة.</p>
      </div>

    </div>
  </div>
</div>
