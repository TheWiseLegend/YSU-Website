<div class="page" dir="rtl">

  <!-- Top Bar (same as dashboard) -->
  <header class="dashboard-header">
    <div class="header-inner">
      <img src="/logo/logo-wide.webp" alt="YSU" class="header-logo" />
      <div class="header-actions">
        <div class="settings-wrapper">
          <button class="settings-btn" (click)="toggleSettings($event)">
            <span class="member-avatar">{{ memberInitials }}</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="settings-dropdown" *ngIf="showSettings">
            <div class="dropdown-info">
              <p class="dropdown-name">{{ member?.fullNameAr }}</p>
              <p class="dropdown-id">{{ member?.membershipId }}</p>
            </div>
            <hr />
            <button class="dropdown-item logout" (click)="logout()">تسجيل الخروج</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Body -->
  <div class="page-body">

    <!-- Back link -->
    <button class="back-link" (click)="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M5 12H19M12 19l7-7-7-7" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      العودة
    </button>

    <!-- Loading -->
    <div class="loading-state" *ngIf="isLoading">
      <div class="spinner"></div>
      <p>جاري التحميل...</p>
    </div>

    <!-- Not Found -->
    <div class="not-found" *ngIf="notFound && !isLoading">
      <div class="not-found-icon">🔍</div>
      <h3>لم يتم العثور على المورد</h3>
      <p>يبدو أن هذا المورد غير موجود أو غير متاح حاليًا.</p>
      <button class="back-btn" (click)="goBack()">العودة للقائمة</button>
    </div>

    <!-- Vendor Card -->
    <div class="vendor-card" *ngIf="vendor && !isLoading">

      <!-- Hero Image -->
      <div class="vendor-hero">
        <ng-container *ngIf="vendor.imageUrl; else noImage">
          <img [src]="vendor.imageUrl" [alt]="vendor.name" class="hero-img" />
        </ng-container>
        <ng-template #noImage>
          <div class="hero-placeholder">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M21 15L16 10L5 21" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>لا توجد صورة</span>
          </div>
        </ng-template>

        <!-- Discount badge on image -->
        <div class="discount-overlay">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8 8a2 2 0 0 0 2.828 0l7.172-7.172a2 2 0 0 0 0-2.828l-8-8z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="7" cy="7" r="1" fill="currentColor"/>
          </svg>
          {{ vendor.discount }}
        </div>
      </div>

      <!-- Info -->
      <div class="vendor-info">

        <!-- Name + category -->
        <div class="vendor-header">
          <h1 class="vendor-name">{{ vendor.name }}</h1>
          <span class="category-badge">
            <svg [lucideIcon]="getCategoryIcon(vendor.categoryIcon)" width="14" height="14"></svg>
            {{ vendor.categoryName }}
          </span>
        </div>

        <!-- Meta rows -->
        <div class="meta-list">

          <div class="meta-row">
            <div class="meta-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8 8a2 2 0 0 0 2.828 0l7.172-7.172a2 2 0 0 0 0-2.828l-8-8z"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="7" cy="7" r="1" fill="currentColor"/>
              </svg>
            </div>
            <div>
              <div class="meta-label">الخصم المتاح</div>
              <div class="meta-value discount-value">{{ vendor.discount }}</div>
            </div>
          </div>

          <div class="meta-row" *ngIf="vendor.location">
            <div class="meta-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 22C16 18 20 14.4183 20 10C20 5.58172 16.4183 2 12 2C7.58172 2 4 5.58172 4 10C4 14.4183 8 18 12 22Z"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div>
              <div class="meta-label">الموقع</div>
              <div class="meta-value">{{ vendor.location }}</div>
            </div>
          </div>

        </div>

        <!-- Maps button -->
        <button class="maps-btn" *ngIf="vendor.mapsUrl" (click)="openMaps()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 22C16 18 20 14.4183 20 10C20 5.58172 16.4183 2 12 2C7.58172 2 4 5.58172 4 10C4 14.4183 8 18 12 22Z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          فتح في خرائط جوجل
        </button>

      </div>
    </div>

  </div>
</div>
