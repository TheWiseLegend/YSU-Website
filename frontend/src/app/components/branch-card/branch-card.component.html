<article class="branch-card">
  <a [routerLink]="['/branches', branch.id]" class="branch-card__link">

    <div class="branch-card__image">
      <img [src]="branch.imageUrl" [alt]="branchTitle" loading="lazy" />
    </div>

    <div class="branch-card__body">
      <div class="branch-card__city">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <path d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 22C16 18 20 14.4183 20 10C20 5.58172 16.4183 2 12 2C7.58172 2 4 5.58172 4 10C4 14.4183 8 18 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>{{ branch.city }}</span>
      </div>

      <h3 class="branch-card__title">{{ branchTitle }}</h3>

      <span class="branch-card__cta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        عرض التفاصيل
      </span>
    </div>

  </a>
</article>
