      </div>

      <div class="nav-links" [class.active]="isMenuOpen">

          <li class="more-dropdown-wrapper desktop-only">
            <button class="more-btn">

          <li class="mobile-only"><a routerLink="/student-guide" routerLinkActive="active" (click)="isMenuOpen = false">دليل الطالب</a></li>
          <li class="mobile-only"><a routerLink="/universities" routerLinkActive="active" (click)="isMenuOpen = false">الجامعات</a></li>
