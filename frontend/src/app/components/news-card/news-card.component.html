<article class="news-card" [routerLink]="['/news', news.id]" appIntersectionLazyLoad="{{news.imageUrl}}">

  <div class="news-card__image">
    <app-optimized-image
      [src]="news.imageUrl"
      [alt]="news.title"
      [height]="220">
    </app-optimized-image>
  </div>

  <div class="news-card__body">
    <div class="news-card__meta">
      <span class="news-card__date">{{ formatDate(news.createdAt) }}</span>
      <span class="news-card__line"></span>
    </div>
    <h3 class="news-card__title">{{ news.title }}</h3>
    <p class="news-card__summary">{{ limitSummary(news.summary) }}</p>
    <span class="news-card__link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      قراءة المزيد
    </span>
  </div>

</article>
